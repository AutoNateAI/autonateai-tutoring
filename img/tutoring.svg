<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="#fffbe6" />
  <!-- Mentor -->
  <circle cx="35" cy="40" r="10" fill="#3578e5" />
  <path d="M20 70 Q35 55 50 70" fill="none" stroke="#3578e5" stroke-width="4" />
  <!-- Student -->
  <circle cx="65" cy="45" r="8" fill="#25c2a0" />
  <path d="M55 75 Q65 65 75 75" fill="none" stroke="#25c2a0" stroke-width="4" />
  <!-- Spark of knowledge -->
  <circle cx="50" cy="35" r="3" fill="#ffba00">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
